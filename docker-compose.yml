services:
  webhook:
    build:
      context: ./
      dockerfile: ./Dockerfile
    hostname: ci.temmi.land
    container_name: ci-web
    restart: always
    env_file:
      - ./.env
    volumes:
      - ./ci/hooks.json:/etc/webhook/hooks.json:ro
      - ./config/repos.json:/opt/webhook/repos.json:ro
      - ./ci/deploy.sh:/opt/webhook/deploy.sh:ro
      - ./ci/_deploy.sh:/opt/webhook/_deploy.sh:ro
      - ./ci/data/status:/opt/webhook/status
      - ./ci/data/logs:/opt/webhook/logs
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PROJECTS_ROOT}:/opt/webhook/projects
      - ~/.gitconfig:/home/webhook/.gitconfig:ro
      - ~/.ssh:/home/webhook/.ssh:ro
    working_dir: /opt/webhook
    command: >
      -hooks /etc/webhook/hooks.json
      -port ${CI_PORT}
      -verbose
    ports:
      - "${CI_PORT}:${CI_PORT}"
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ci-web.entrypoints=web"
      - "traefik.http.routers.ci-web.rule=Host(`ci.temmi.land`) || Host(`www.ci.temmi.land`)"
      - "traefik.http.middlewares.ci-web-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.ci-web.middlewares=ci-web-https-redirect"
      - "traefik.http.routers.ci-web-secure.entrypoints=websecure"
      - "traefik.http.routers.ci-web-secure.rule=Host(`ci.temmi.land`) || Host(`www.ci.temmi.land`)"
      - "traefik.http.routers.ci-web-secure.tls=true"
      - "traefik.http.routers.ci-web-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.ci-web-secure.service=ci-web"
      - "traefik.http.services.ci-web.loadbalancer.server.port=${CI_PORT}"
      - "traefik.docker.network=proxy"

  updater:
    build:
      context: ./
      dockerfile: ./Dockerfile
    hostname: update.ci.temmi.land
    container_name: ci-updater
    env_file:
      - ./.env
    volumes:
      - ./ci-updater/hooks.json:/etc/webhook/hooks.json:ro
      - ./ci-updater/update.sh:/opt/webhook/update.sh:ro
      - ./ci-updater/data/status:/opt/webhook/status
      - ./ci-updater/data/logs:/opt/webhook/logs
      - ${MAIN_WEBHOOK_DIR}:/opt/webhook/ci-main
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.gitconfig:/home/webhook/.gitconfig:ro
      - ~/.ssh:/home/webhook/.ssh:ro
    working_dir: /opt/webhook
    command: >
      -hooks /etc/webhook/hooks.json
      -port ${CI_UPDATER_PORT}
      -verbose
    ports:
      - "${CI_UPDATER_PORT}:${CI_UPDATER_PORT}"
    networks:
      - default
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ci-updater.rule=Host(`${CI_UPDATER_DOMAIN}`,`www.${CI_UPDATER_DOMAIN}`)"
      - "traefik.http.routers.ci-updater.entrypoints=websecure"
      - "traefik.http.routers.ci-updater.tls.certresolver=letsencrypt"
      - "traefik.http.services.ci-updater.loadbalancer.server.port=${CI_UPDATER_PORT}"
      - "traefik.docker.network=${TRAEFIK_NETWORK_NAME}"

networks:
  proxy:
    external: true
  default:
    driver: bridge
